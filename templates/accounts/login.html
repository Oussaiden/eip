<!DOCTYPE html>
<html lang="fr" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EIP Imprimerie — Connexion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    {% load static %}
    <style>
        :root {
            --eip-blue:   #1a4b8c;
            --eip-pink:   #e91e8c;
            --eip-yellow: #f5c400;
        }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--eip-blue) 0%, #0f2a52 100%);
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            border: none;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-header {
            background: var(--eip-blue);
            border-radius: 16px 16px 0 0;
            padding: 32px;
            text-align: center;
        }
        .login-header img {
            height: 60px;
            border-radius: 8px;
            margin-bottom: 16px;
        }
        .login-header h1 {
            color: white;
            font-size: 20px;
            font-weight: 700;
            margin: 0;
        }
        .login-header p {
            color: rgba(255,255,255,0.6);
            font-size: 13px;
            margin: 4px 0 0;
        }
        .btn-login {
            background: var(--eip-pink);
            border: none;
            color: white;
            font-weight: 600;
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            font-size: 15px;
            transition: background 0.2s;
        }
        .btn-login:hover {
            background: #c4187a;
            color: white;
        }
        .accent-bar {
            height: 4px;
            background: linear-gradient(90deg, var(--eip-blue), var(--eip-pink), var(--eip-yellow));
            border-radius: 0 0 16px 16px;
        }
    </style>
</head>
<body>
    <div class="login-card card">
        <div class="login-header">
            <img src="{% static 'img/logo.jpg' %}" alt="EIP">
            <h1>EIP Imprimerie</h1>
            <p>Éditions & Impressions du Pacifique</p>
        </div>
        <div class="card-body p-4">
            {% if form.errors %}
            <div class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="bi bi-exclamation-triangle me-2"></i>
                Identifiant ou mot de passe incorrect.
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">Nom d'utilisateur</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" name="username" class="form-control" placeholder="Votre identifiant" autofocus required>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Mot de passe</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" name="password" class="form-control" placeholder="Votre mot de passe" required>
                    </div>
                </div>
                <button type="submit" class="btn-login btn">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Se connecter
                </button>
            </form>
        </div>
        <div class="accent-bar"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
