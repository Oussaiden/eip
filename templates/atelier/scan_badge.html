<!DOCTYPE html>
<html lang="fr" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atelier — EIP Imprimerie</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background: #0f0f1a;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .atelier-card {
            background: #1e1e2e;
            border-radius: 16px;
            padding: 48px 40px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            text-align: center;
        }
        .atelier-logo {
            font-size: 12px;
            color: rgba(255,255,255,0.3);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }
        .scan-icon {
            font-size: 64px;
            color: #1a4b8c;
            margin-bottom: 24px;
        }
        .atelier-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .atelier-subtitle {
            font-size: 14px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 36px;
        }
        .scan-field {
            background: #12121f;
            border: 2px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: white;
            font-size: 20px;
            font-weight: 600;
            padding: 16px 20px;
            width: 100%;
            text-align: center;
            transition: border-color 0.2s;
            margin-bottom: 16px;
            letter-spacing: 2px;
        }
        .scan-field:focus {
            outline: none;
            border-color: #1a4b8c;
            background: #12121f;
            color: white;
        }
        .scan-field::placeholder {
            color: rgba(255,255,255,0.2);
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 0;
        }
        .btn-atelier {
            background: #1a4b8c;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-atelier:hover { background: #15407a; }
        .erreur {
            background: rgba(220,53,69,0.15);
            border: 1px solid rgba(220,53,69,0.3);
            border-radius: 10px;
            color: #f8707d;
            padding: 12px 16px;
            font-size: 13px;
            margin-bottom: 16px;
        }
        .heure {
            margin-top: 40px;
            font-size: 13px;
            color: rgba(255,255,255,0.2);
        }
        .heure span {
            font-size: 20px;
            font-weight: 600;
            color: rgba(255,255,255,0.35);
            display: block;
            margin-top: 4px;
        }
    </style>
</head>
<body>

<div class="atelier-card">
    <div class="atelier-logo">EIP Imprimerie</div>
    <div class="scan-icon"><i class="bi bi-person-badge"></i></div>
    <div class="atelier-title">Identification</div>
    <div class="atelier-subtitle">Scannez votre badge ou saisissez votre identifiant</div>

    {% if erreur %}
    <div class="erreur"><i class="bi bi-exclamation-triangle me-2"></i>{{ erreur }}</div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <input type="text"
               name="badge"
               id="badge"
               class="scan-field"
               placeholder="Badge employé..."
               autocomplete="off"
               autofocus>
        <button type="submit" class="btn-atelier">
            <i class="bi bi-arrow-right-circle me-2"></i>Valider
        </button>
    </form>

    <div class="heure">
        <span id="heure"></span>
    </div>
</div>

<script>
    document.getElementById('badge').focus();

    document.getElementById('badge').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            this.closest('form').submit();
        }
    });

    function majHeure() {
        const now = new Date();
        const h = now.getHours().toString().padStart(2, '0');
        const m = now.getMinutes().toString().padStart(2, '0');
        const s = now.getSeconds().toString().padStart(2, '0');
        document.getElementById('heure').textContent = `${h}:${m}:${s}`;
    }
    majHeure();
    setInterval(majHeure, 1000);
</script>

</body>
</html>
